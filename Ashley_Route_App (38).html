<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Ashley Route</title>
<style>

:root{--p:#E8196A;--pd:#C4115A;--pl:#F5D0E3;--bg:#FDF5F8;--card:#fff;
  --c1:#2A0A15;--c2:#7A4060;--c3:#B08090;--bdr:#F0D0E0;--grn:#1B8A5A;--gbg:#E8F5EE}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--c1);min-height:100vh;overflow-x:hidden}
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity .3s}
#ld.out{opacity:0;pointer-events:none}
.ld-logo{width:80px;height:80px;background:linear-gradient(135deg,#C4115A,#E8196A);
  border-radius:22px;display:flex;align-items:center;justify-content:center;
  font-size:40px;box-shadow:0 8px 28px rgba(232,25,106,.28)}
.ld-h{font-size:22px;font-weight:800;color:var(--c1)}
.ld-brand{font-size:12px;font-weight:700;color:var(--p);letter-spacing:1px;text-transform:uppercase}
.ld-s{font-size:13px;color:var(--c3)}
.spin{width:26px;height:26px;border:3px solid var(--pl);border-top-color:var(--p);
  border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hdr{background:linear-gradient(135deg,#C4115A,#E8196A,#F04090);
  padding:env(safe-area-inset-top,52px) 22px 22px;position:relative;overflow:hidden}
.hdr:before{content:"";position:absolute;top:-60px;right:-40px;width:200px;height:200px;
  background:rgba(255,255,255,.07);border-radius:50%}
.hdr:after{content:"";position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;
  background:rgba(255,255,255,.04);border-radius:50%}
.hdr-brand{display:flex;align-items:center;justify-content:center;gap:0;
  position:relative;z-index:1;padding-top:8px}
.hdr-divider{width:1px;height:28px;background:rgba(255,255,255,.4);margin:0 12px;flex-shrink:0}
.hdr-otg{font-family:"Playfair Display",Georgia,serif;font-size:18px;font-style:italic;
  color:#fff;letter-spacing:.5px;text-decoration:underline;
  text-decoration-color:rgba(255,255,255,.5);text-underline-offset:4px}
.hdr-rule{height:1px;background:rgba(255,255,255,.2);margin:14px 0 14px;
  position:relative;z-index:1}
.hdr-day-row{display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1}
.d-pill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600}
.h-ey{color:rgba(255,255,255,.7);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:2px}
.h-day{color:#fff;font-size:34px;font-weight:800;line-height:1.1}
.prog{margin-top:13px;display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.p-track{flex:1;height:4px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.p-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s ease}
.p-lbl{color:rgba(255,255,255,.85);font-size:12px;font-weight:600;white-space:nowrap}
.content{padding:16px 15px 108px;max-width:480px;margin:0 auto}
.scr{display:none}.scr.on{display:block}
.cc{background:#fff;border-radius:18px;box-shadow:0 6px 32px rgba(232,25,106,.12);
  overflow:hidden;margin-bottom:12px;border:1px solid var(--bdr)}
.cc-top{background:linear-gradient(135deg,#C4115A,#E8196A);padding:13px 17px;
  display:flex;align-items:center;justify-content:space-between}
.cc-ey{color:rgba(255,255,255,.8);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.cc-pill{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;color:#fff;font-size:11px;font-weight:700}
.cc-body{padding:17px}
.f-name{font-size:19px;font-weight:800;color:var(--c1);line-height:1.2;margin-bottom:6px}
.f-addr{display:flex;align-items:flex-start;gap:7px;color:var(--c2);font-size:13px;line-height:1.5;margin-bottom:12px}
.note-prev{background:var(--bg);border-radius:10px;border:1px solid var(--bdr);
  padding:10px 12px;cursor:pointer;margin-bottom:4px}
.note-prev:active{border-color:var(--p)}
.note-lbl{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:4px}
.note-txt{font-size:13px;color:var(--c2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-txt.empty{color:var(--c3);font-style:italic}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px 20px;margin-top:10px;color:#fff;font-size:15px;font-weight:700;
  border:none;border-radius:12px;cursor:pointer;text-decoration:none;
  font-family:inherit;user-select:none;-webkit-touch-callout:none}
.btn-nav{background:linear-gradient(135deg,#C4115A,#E8196A);box-shadow:0 4px 16px rgba(232,25,106,.35)}
.btn-nav:active{opacity:.85}
.btn-done{background:linear-gradient(135deg,#1B8A5A,#2AA876);box-shadow:0 4px 14px rgba(27,138,90,.3)}
.btn-done:active{opacity:.85}
.btn-home{background:linear-gradient(135deg,#1B8A5A,#2AA876);box-shadow:0 4px 14px rgba(27,138,90,.3)}
.nxt{background:#fff;border-radius:12px;border:1px solid var(--bdr);
  padding:12px 14px;margin-top:10px;display:flex;align-items:center;gap:10px}
.nxt-dot{width:7px;height:7px;background:var(--pl);border-radius:50%;flex-shrink:0}
.nxt-ey{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.5px}
.nxt-nm{font-size:13px;font-weight:600;color:var(--c1);margin-top:1px}
.s-title{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;
  letter-spacing:1.5px;margin:20px 0 8px 2px}
.slist{display:flex;flex-direction:column;gap:6px}
.si{background:#fff;border-radius:12px;border:1px solid var(--bdr);
  padding:10px 12px;display:flex;align-items:center;gap:10px}
.si.done{opacity:.35}.si.cur{border-color:var(--p);background:#FFF0F6}
.si.nav{border-color:#1B8A5A;background:#F0FBF6}
.sn{width:26px;height:26px;border-radius:50%;background:var(--bg);
  border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--c3);flex-shrink:0}
.sn.dn{background:var(--gbg);border-color:#B8DFD0;color:var(--grn);font-size:13px}
.sn.ac{background:var(--p);border-color:var(--p);color:#fff}
.sn.nv{background:#1B8A5A;border-color:#1B8A5A;color:#fff;font-size:13px}
.si-i{flex:1;min-width:0}
.si-n{font-size:13px;font-weight:600;color:var(--c1)}
.si-a{font-size:11px;color:var(--c3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.off{text-align:center;padding:52px 18px}
.off-i{font-size:50px;margin-bottom:12px}
.off-h{font-size:22px;font-weight:800;color:var(--c1);margin-bottom:6px}
.off-s{font-size:14px;color:var(--c2);line-height:1.6}
.nwb{margin-top:20px;background:#fff;border-radius:12px;border:1px solid var(--bdr);padding:14px;text-align:left}
.nwb-e{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:1px}
.nwb-d{font-size:16px;font-weight:700;color:var(--p);margin-top:3px}
.nwb-c{font-size:12px;color:var(--c2);margin-top:2px}
.done-w{text-align:center;padding:34px 12px}
.done-i{font-size:56px;margin-bottom:12px}
.done-h{font-size:24px;font-weight:800;color:var(--c1);margin-bottom:6px}
.done-s{font-size:13px;color:var(--c2);margin-bottom:20px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat{background:#fff;border-radius:12px;border:1px solid var(--bdr);padding:13px;text-align:center}
.stat-n{font-size:24px;font-weight:800;color:var(--p)}
.stat-l{font-size:10px;color:var(--c3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.thu{background:linear-gradient(135deg,#1A0A3A,#2D1B5A);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.thu-e{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.thu-n{font-size:13px;font-weight:700;color:#fff;margin-top:2px}
.wi{background:#fff;border-radius:12px;border:1px solid var(--bdr);
  padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.wi.wt{border-color:var(--p);background:#FFF0F6}
.wbox{width:44px;height:44px;border-radius:12px;background:var(--bg);
  border:1.5px solid var(--bdr);display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0}
.wbox.wt{background:var(--p);border-color:var(--p)}
.wn{font-size:18px;font-weight:800;color:var(--c1);line-height:1}
.wn.wt{color:#fff}
.wd{font-size:9px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.3px}
.wd.wt{color:rgba(255,255,255,.7)}
.wi-i{flex:1}.wi-dn{font-size:14px;font-weight:700;color:var(--c1)}
.wi-ct{font-size:12px;color:var(--c3);margin-top:2px}
.t-tag{display:inline-block;background:var(--p);color:#fff;font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:8px;text-transform:uppercase;vertical-align:middle;margin-left:5px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--bdr);padding:8px 0 env(safe-area-inset-bottom,14px);
  display:flex;justify-content:space-around;z-index:100}
.ntab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 22px;
  cursor:pointer;background:none;border:none;color:var(--c3);font-size:10px;
  font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-family:inherit}
.ntab.on{color:var(--p)}
.ntab svg{width:20px;height:20px}
#note-modal{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;background:var(--bg)}
#note-modal.open{display:flex}
.nm-hdr{background:linear-gradient(135deg,#C4115A,#E8196A);
  padding:env(safe-area-inset-top,44px) 18px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.nm-title{color:#fff;font-size:15px;font-weight:700;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nm-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;font-family:inherit}

.nm-body{flex:1;overflow-y:auto;padding:20px 18px}
.nm-read{font-size:15px;color:var(--c1);line-height:1.7;white-space:pre-wrap;min-height:100px}
.nm-read.empty{color:var(--c3);font-style:italic}
.nm-textarea{width:100%;min-height:220px;font-size:15px;color:var(--c1);
  line-height:1.7;border:1.5px solid var(--p);border-radius:12px;padding:12px;
  font-family:inherit;background:#fff;resize:none;outline:none;display:none}
.nm-footer{padding:16px 18px env(safe-area-inset-bottom,20px);
  border-top:1px solid var(--bdr);background:#fff;display:none;gap:10px}
.nm-footer.show{display:flex}
.nm-save{flex:1;padding:14px;background:linear-gradient(135deg,#C4115A,#E8196A);
  color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;
  cursor:pointer;font-family:inherit}
.nm-cancel{padding:14px 20px;background:var(--bg);color:var(--c2);
  font-size:15px;font-weight:600;border:1px solid var(--bdr);border-radius:12px;
  cursor:pointer;font-family:inherit}
.nm-status{text-align:center;font-size:13px;color:var(--c3);padding:8px 0;display:none}
.pri-badge{display:inline-flex;align-items:center;gap:3px;background:#FFF8E6;
  border:1px solid #F5D680;border-radius:20px;padding:2px 8px;
  font-size:11px;font-weight:700;color:#9A6F00;vertical-align:middle;margin-left:4px}

</style>

<div id="ld">

<div id="note-modal">

  <div class="content">
    <div id="t-scr" class="scr on"></div>

    <div id="m-scr" class="scr"></div>
  </div>
  <div class="bnav">
    <button class="ntab on" id="tab-t" onclick="show('t')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Today

    <button class="ntab" id="tab-w" onclick="show('w')">

      This Week

    <button class="ntab" id="tab-m" onclick="show('m')">

      Monthly
    </button>
  </div>
</div>

var notesCache = {};

function loadAllNotes() {
  if (!SCRIPT_URL || SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") return;
  fetch(SCRIPT_URL + "?action=getAll")
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.success) { notesCache = d.notes || {}; renderT(); } })
    .catch(function() {});
}

function getNote(name) { return notesCache[name] || ""; }

var curNoteFacility = "";
var editing = false;

function openNoteEl(el) { openNote(el.getAttribute("data-fac")); }
function openNote(name) {
  curNoteFacility = name;
  editing = true;
  var note = getNote(name);
  document.getElementById("nm-title").textContent = name;
  // Last visited
  var lv = localStorage.getItem("lv_" + name);
  var lvEl = document.getElementById("nm-last-visited");
  if (lv) {
    var lvDate = new Date(lv);
    var today = new Date();
    var diff = Math.round((today - lvDate) / (1000*60*60*24));
    var diffStr = diff === 0 ? "today" : diff === 1 ? "yesterday" : diff + " days ago";
    lvEl.textContent = "Last visited: " + diffStr + " (" + lvDate.toLocaleDateString("en-US",{month:"short",day:"numeric"}) + ")";
    lvEl.style.display = "block";
  } else {
    lvEl.textContent = "No previous visit recorded";
    lvEl.style.display = "block";
  }
  document.getElementById("nm-read").style.display = "none";
  var ta = document.getElementById("nm-textarea");
  ta.style.display = "block";
  ta.value = note;
  document.getElementById("nm-footer").classList.add("show");
  document.getElementById("nm-status").style.display = "none";
  document.getElementById("note-modal").classList.add("open");
  document.body.style.overflow = "hidden";
  setTimeout(function() { ta.focus(); }, 100);
}

function closeNote() {
  document.getElementById("note-modal").classList.remove("open");
  document.body.style.overflow = "";
  editing = false;
}



function cancelEdit() {
  editing = false;
  closeNote();
}

function saveNote() {
  var note = document.getElementById("nm-textarea").value.trim();
  var st = document.getElementById("nm-status");
  st.textContent = "Saving...";
  st.style.display = "block";
  document.getElementById("nm-footer").classList.remove("show");
  if (note) { notesCache[curNoteFacility] = note; }
  else { delete notesCache[curNoteFacility]; }
  if (SCRIPT_URL && SCRIPT_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({action:"save", facility:curNoteFacility, note:note})
    })
    .then(function() { st.textContent = "Saved!"; })
    .catch(function() { st.textContent = "Saved locally"; })
    .finally(function() {
      setTimeout(function() {
        st.style.display = "none";
        closeNote();
        renderT();
      }, 700);
    });
  } else {
    localStorage.setItem("note_" + curNoteFacility, note);
    st.textContent = "Saved!";
    setTimeout(function() { st.style.display="none"; closeNote(); renderT(); }, 500);
  }
}

function dk(d) {
  return d.getFullYear() + "-" + ("0"+(d.getMonth()+1)).slice(-2) + "-" + ("0"+d.getDate()).slice(-2);
}
function wkKey(d) {
  var m = new Date(d), df = d.getDay()===0 ? -6 : 1-d.getDay();
  m.setDate(d.getDate()+df);
  return dk(m);
}
function getDay(d) { var w = SC[wkKey(d)]; return w ? w[dk(d)] : null; }
function resolve(day) { return day.s.map(function(i) { return SL[i]; }); }
function nextWD(from) {
  var d = new Date(from); d.setDate(d.getDate()+1);
  for (var i=0; i<21; i++) {
    var k = dk(d);
    if (d.getDay()>0 && d.getDay()<6 && !HOL[k] && getDay(d)) return d;
    d.setDate(d.getDate()+1);
  }
  return null;
}

var stopIdx = 0, navigating = false, tDay = null, tKey = "", viewingDate = null;

function loadP() {
  stopIdx = parseInt(localStorage.getItem("rp_"+tKey) || "0");
  navigating = localStorage.getItem("nav_"+tKey) === "1";
}
function saveP() {
  localStorage.setItem("rp_"+tKey, stopIdx);
  localStorage.setItem("nav_"+tKey, navigating ? "1" : "0");
}
function startNav() { navigating = true; saveP(); renderT(); }
function completeStop() {
  if (tDay && stopIdx < resolve(tDay).length) {
    var s = resolve(tDay)[stopIdx];
    localStorage.setItem("lv_" + s[0], new Date().toISOString().split("T")[0]);
  }
  navigating = false; stopIdx++; saveP(); renderT();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function safeAttr(s) {
  return String(s).replace(/'/g,"&#39;").replace(/"/g,"&quot;");
}

function viewDay(dateStr) {
  viewingDate = dateStr;
  show("t");
}

function renderT() {
  var targetDate = viewingDate ? new Date(viewingDate + "T12:00:00") : new Date();
  var el = document.getElementById("t-scr");
  var now = targetDate;
  var isToday = !viewingDate;
  tKey = dk(now);
  document.getElementById("hdr-day").textContent = (isToday ? "" : "&#8592; ") + DAYS[now.getDay()];
  document.getElementById("hdr-date").textContent = SMONS[now.getMonth()] + " " + now.getDate();

  if (!isToday) {
    // Show back to today button
    var backBtn = '<button onclick="viewingDate=null;renderT()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:12px;display:block">&#8592; Back to Today</button>';
    el.innerHTML = backBtn;
  }

  if (now.getDay()===0 || now.getDay()===6) {
    offDay(el, "&#9728;&#65039;", "Enjoy the Weekend!", "No route today. See you Monday!");
    document.getElementById("prog").style.display = "none"; return;
  }
  if (HOL[tKey]) {
    offDay(el, "&#127881;", HOL[tKey], "Enjoy the day off!");
    document.getElementById("prog").style.display = "none"; return;
  }
  tDay = getDay(now);
  if (!tDay) {
    offDay(el, "&#128197;", "No Route Scheduled", "Check back on your next work day.");
    document.getElementById("prog").style.display = "none"; return;
  }

  loadP();
  var stops = resolve(tDay), total = stops.length, done = Math.min(stopIdx, total);
  document.getElementById("prog").style.display = "flex";
  document.getElementById("p-fill").style.width = (done/total*100) + "%";
  document.getElementById("p-lbl").textContent = done + " of " + total + " stops";

  var h = "";
  if (tDay.t) {
    h += '<div class="thu"><div style="font-size:20px">&#127866;</div>';
    h += '<div><div class="thu-e">TONIGHT&#39;S ENDPOINT</div>';
    h += '<div class="thu-n">Hillside Pub &#8212; Beaverton</div></div></div>';
  }

  if (stopIdx >= total) {
    var dest = tDay.t ? "Hillside Pub" : "Home";
    var durl = "maps://maps.apple.com/?daddr=" + (tDay.t ? HILL : HC) + "&dirflg=d";
    h += '<div class="done-w">';
    h += '<div class="done-i">&#127881;</div>';
    h += '<div class="done-h">All ' + total + ' Stops Done!</div>';
    h += '<div class="done-s">Great work today, Ashley.</div>';
    h += '<div class="d-grid">';
    h += '<div class="stat"><div class="stat-n">' + total + '</div><div class="stat-l">Completed</div></div>';
    h += '<div class="stat"><div class="stat-n">' + (tDay.t ? "&#127866;" : "&#127968;") + '</div><div class="stat-l">' + dest + ' Next</div></div>';
    h += '</div>';
    h += '<a href="' + durl + '" class="btn btn-home">';
    h += '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';
    h += 'Route to ' + dest + '</a></div>';
  } else {
    var s = stops[stopIdx];
    var murl = "maps://maps.apple.com/?daddr=" + s[2] + "," + s[3] + "&dirflg=d";
    var note = getNote(s[0]);
    h += '<div class="cc">';
    h += '<div class="cc-top">';
    h += '<span class="cc-ey">NOW HEADING TO</span>';
    h += '<span class="cc-pill">Stop ' + (stopIdx+1) + ' of ' + total + '</span>';
    h += '</div><div class="cc-body">';
    var isPri = PRIORITY.indexOf(s[0]) !== -1;
    h += '<div class="f-name">' + esc(s[0]) + (isPri ? ' <span class="pri-badge">&#11088; Priority</span>' : '') + '</div>';
    h += '<div class="f-addr"><span style="color:#E8196A;flex-shrink:0;margin-top:1px">&#128205;</span>';
    h += '<span>' + esc(s[1]) + '</span></div>';
    h += '<div class="note-prev" data-fac="' + safeAttr(s[0]) + '" onclick="openNoteEl(this)">';
    h += '<div class="note-lbl">&#128221; Notes</div>';
    if (note) {
      h += '<div class="note-txt">' + esc(note) + '</div>';
    } else {
      h += '<div class="note-txt empty">Tap to add notes&#8230;</div>';
    }
    h += '</div>';
    if (navigating) {
      h += '<button class="btn btn-done" onclick="completeStop()">';
      h += '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      h += 'Stop Complete</button>';
    } else {
      h += '<a class="btn btn-nav" href="' + murl + '" onclick="startNav()">';
      h += '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';
      h += 'Navigate to Stop ' + (stopIdx+1) + '</a>';
    }
    h += '</div></div>';
    if (stopIdx+1 < total) {
      var n = stops[stopIdx+1];
      h += '<div class="nxt"><div class="nxt-dot"></div>';
      h += '<div><div class="nxt-ey">UP NEXT</div><div class="nxt-nm">' + esc(n[0]) + '</div></div></div>';
    } else {
      h += '<div class="nxt"><div class="nxt-dot"></div>';
      h += '<div><div class="nxt-ey">AFTER THIS</div>';
      h += '<div class="nxt-nm">Route to ' + (tDay.t ? "Hillside Pub" : "Home") + '</div></div></div>';
    }
  }

  h += '<div class="s-title">Today&#39;s Full Route</div><div class="slist">';
  for (var i = 0; i < stops.length; i++) {
    var st = stops[i];
    var isDone = i < stopIdx;
    var isNav  = i === stopIdx && navigating;
    var isCur  = i === stopIdx && !navigating;
    var sNote  = getNote(st[0]);
    var cls = "si" + (isDone?" done":"") + (isCur?" cur":"") + (isNav?" nav":"");
    var ncls = "sn" + (isDone?" dn":"") + (isCur?" ac":"") + (isNav?" nv":"");
    var num = isDone ? "&#10003;" : (isNav ? "&#10003;" : String(i+1));
    h += '<div class="' + cls + '">';
    h += '<div class="' + ncls + '">' + num + '</div>';
    var stPri = PRIORITY.indexOf(st[0]) !== -1;
    h += '<div class="si-i"><div class="si-n">' + esc(st[0]) + (stPri ? ' &#11088;' : '') + '</div>';
    h += '<div class="si-a">' + (sNote ? "&#128221; " + esc(sNote.substring(0,40)) + (sNote.length>40?"...":"") : esc(st[1])) + '</div>';
    h += '</div></div>';
  }
  var fd = stopIdx >= total;
  var fl = tDay.t ? "Hillside Pub" : "Home";
  var fa = tDay.t ? "16305 SW Barrows Rd, Beaverton" : "6258 NE Rosebay Dr, Hillsboro";
  h += '<div class="si' + (fd ? " done" : "") + '">';
  h += '<div class="sn' + (fd ? " dn" : "") + '" style="font-size:12px">' + (fd ? "&#10003;" : (tDay.t ? "&#127866;" : "&#127968;")) + '</div>';
  h += '<div class="si-i"><div class="si-n">' + fl + '</div>';
  h += '<div class="si-a">' + fa + '</div></div></div></div>';
  if (viewingDate) {
    var backBtn = document.querySelector("#t-scr button");
    el.innerHTML = (backBtn ? backBtn.outerHTML : "") + h;
  } else {
    // Check for unfinished previous days and show banner
    var unfinishedBanner = "";
    var checkDate = new Date(); checkDate.setDate(checkDate.getDate()-1);
    for (var ci=0; ci<5; ci++) {
      if (checkDate.getDay() > 0 && checkDate.getDay() < 6) {
        var ck = dk(checkDate);
        var cd = getDay(checkDate);
        if (cd) {
          var savedIdx = parseInt(localStorage.getItem("rp_"+ck)||"0");
          var totalStops = resolve(cd).length;
          if (savedIdx > 0 && savedIdx < totalStops) {
            var rem = totalStops - savedIdx;
            unfinishedBanner = '<div onclick="viewDay(\''+ck+'\')" style="background:#FFF8E6;border:1px solid #F5D680;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">'
              +'<div><div style="font-size:11px;font-weight:700;color:#9A6F00;text-transform:uppercase;letter-spacing:.5px">Unfinished Route</div>'
              +'<div style="font-size:14px;font-weight:700;color:#2A0A15;margin-top:2px">'+DAYS[checkDate.getDay()]+' '+SMONS[checkDate.getMonth()]+' '+checkDate.getDate()+' &bull; '+rem+' stops remaining</div></div>'
              +'<div style="color:#9A6F00;font-size:18px">&#8594;</div></div>';
            break;
          }
        }
      }
      checkDate.setDate(checkDate.getDate()-1);
    }
    el.innerHTML = unfinishedBanner + h;
  }
}

function offDay(el, icon, title, sub) {
  var next = nextWD(new Date()), nxt = "";
  if (next) {
    var nd = getDay(next);
    nxt = '<div class="nwb"><div class="nwb-e">NEXT ROUTE DAY</div>';
    nxt += '<div class="nwb-d">' + DAYS[next.getDay()] + ", " + MONS[next.getMonth()] + " " + next.getDate() + '</div>';
    if (nd) nxt += '<div class="nwb-c">' + resolve(nd).length + ' stops scheduled</div>';
    nxt += '</div>';
  }
  el.innerHTML = '<div class="off"><div class="off-i">' + icon + '</div>';
  el.innerHTML += '<div class="off-h">' + title + '</div>';
  el.innerHTML += '<div class="off-s">' + sub + '</div>' + nxt + '</div>';
}

function renderW() {
  var el = document.getElementById("w-scr");
  var now = new Date(), todK = dk(now);
  var mon = new Date(now), df = now.getDay()===0 ? -6 : 1-now.getDay();
  mon.setDate(now.getDate()+df);
  var h = '<div class="s-title">This Week</div>';
  for (var i = 0; i < 5; i++) {
    var d = new Date(mon); d.setDate(mon.getDate()+i);
    var k = dk(d), isT = k===todK, hol = HOL[k], data = getDay(d);
    h += '<div class="wi' + (isT ? " wt" : "") + '" onclick="viewDay(\''+k+'\')" style="cursor:pointer">';
    h += '<div class="wbox' + (isT ? " wt" : "") + '">';
    h += '<div class="wn' + (isT ? " wt" : "") + '">' + d.getDate() + '</div>';
    h += '<div class="wd' + (isT ? " wt" : "") + '">' + SDAYS[d.getDay()] + '</div></div>';
    h += '<div class="wi-i"><div class="wi-dn">' + DAYS[d.getDay()];
    if (isT) h += '<span class="t-tag">Today</span>';
    h += '</div><div class="wi-ct">';
    if (hol) {
      h += "&#127881; " + hol;
    } else if (data) {
      var dName = DAYS[d.getDay()];
      var wkSt = WKLY_STOPS[dName] || 0;
      var wkVi = WKLY_VISITS[dName] || 0;
      var totalSt = resolve(data).length;
      var afhSt = totalSt - wkSt;
      var totalVi = wkVi + afhSt;
      h += totalSt + " stops &bull; " + totalVi + " visits";
    } else {
      h += "No route";
    }
    h += '</div></div></div>';
  }
  el.innerHTML = h;
}

function fetchWeather() {
  var WC = {0:"Clear",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Icy Fog",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",80:"Showers",81:"Showers",82:"Heavy Showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};
  var icons = {0:"☀️",1:"🌤",2:"⛅️",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌧",55:"🌧",
    61:"🌦",63:"🌧",65:"🌧",71:"🌨",73:"❄️",75:"❄️",80:"🌦",81:"🌧",82:"⛈",95:"⛈",96:"⛈",99:"⛈"};
  fetch("https://api.open-meteo.com/v1/forecast?latitude=45.537&longitude=-122.916&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America/Los_Angeles")
    .then(function(r){return r.json();})
    .then(function(d){
      var temp = Math.round(d.current.temperature_2m);
      var code = d.current.weather_code;
      var icon = icons[code] || "🌡";
      var desc = WC[code] || "Clear";
      var el = document.getElementById("hdr-weather");
      el.textContent = icon + " " + temp + "°F · " + desc;
      el.style.display = "block";
    })
    .catch(function(){});
}

function renderM() {
  var el = document.getElementById("m-scr");
  var now = new Date();
  var monthKey = now.getFullYear() + "-" + ("0"+(now.getMonth()+1)).slice(-2);
  var todayStr = dk(now);
  var visits = MONTHLY_AFH[monthKey] || [];
  var total = visits.length;
  var done = visits.filter(function(v) { return v.d <= todayStr; }).length;
  var remaining = visits.filter(function(v) { return v.d > todayStr; }).length;
  var pct = total > 0 ? Math.round(done/total*100) : 0;

  var monthName = now.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  var h = '<div class="s-title">' + monthName + ' AFH Progress</div>';

  // Progress card
  h += '<div style="background:#fff;border-radius:18px;border:1px solid var(--bdr);';
  h += 'box-shadow:0 4px 20px rgba(232,25,106,.1);padding:20px;margin-bottom:16px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">';
  h += '<div><div style="font-size:13px;font-weight:600;color:var(--c3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Visits Complete</div>';
  h += '<div style="font-size:40px;font-weight:800;color:var(--p);line-height:1">' + done + '<span style="font-size:20px;color:var(--c3)">/' + total + '</span></div></div>';
  h += '<div style="text-align:right"><div style="font-size:32px;font-weight:800;color:var(--p)">' + pct + '%</div>';
  h += '<div style="font-size:12px;color:var(--c3)">' + remaining + ' remaining</div></div>';
  h += '</div>';
  // Progress bar
  h += '<div style="height:8px;background:var(--pl);border-radius:4px;overflow:hidden">';
  h += '<div style="height:100%;width:' + pct + '%;background:linear-gradient(135deg,var(--pd),var(--p));border-radius:4px;transition:width .4s ease"></div></div>';
  h += '</div>';

  // Upcoming visits this month
  var upcoming = visits.filter(function(v) { return v.d > todayStr; }).slice(0,8);
  var completed = visits.filter(function(v) { return v.d <= todayStr; });

  if (upcoming.length > 0) {
    h += '<div class="s-title">Upcoming This Month</div><div class="slist">';
    upcoming.forEach(function(v) {
      var vDate = new Date(v.d + "T12:00:00");
      var dateStr = vDate.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
      h += '<div class="si"><div class="sn" style="font-size:9px;font-weight:700;width:34px;border-radius:8px;height:34px">';
      h += vDate.getDate() + '<br><span style="font-size:8px">' + ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][vDate.getMonth()] + '</span>';
      h += '</div><div class="si-i"><div class="si-n">' + esc(v.n) + '</div>';
      h += '<div class="si-a">' + v.wd + '</div></div></div>';
    });
    h += '</div>';
  }

  if (completed.length > 0) {
    h += '<div class="s-title">Completed (' + completed.length + ')</div><div class="slist">';
    completed.slice(-5).reverse().forEach(function(v) {
      var vDate = new Date(v.d + "T12:00:00");
      h += '<div class="si done"><div class="sn dn" style="font-size:13px">&#10003;</div>';
      h += '<div class="si-i"><div class="si-n">' + esc(v.n) + '</div>';
      h += '<div class="si-a">' + vDate.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) + '</div></div></div>';
    });
    h += '</div>';
  }

  el.innerHTML = h;
}

function show(n) {
  var scrs = document.querySelectorAll(".scr");
  for (var i=0; i<scrs.length; i++) scrs[i].classList.remove("on");
  var tabs = document.querySelectorAll(".ntab");
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove("on");
  document.getElementById(n+"-scr").classList.add("on");
  document.getElementById("tab-"+n).classList.add("on");
  if (n==="t") renderT();
  if (n==="w") { viewingDate=null; renderW(); }
  if (n==="m") renderM();
}

window.addEventListener("load", function() {
  try {
    document.getElementById("app").style.display = "block";
    var ld = document.getElementById("ld");
    ld.classList.add("out");
    setTimeout(function() { ld.style.display = "none"; }, 400);
    show("t");
    loadAllNotes();
    fetchWeather();
  } catch(e) {
    document.getElementById("ld").innerHTML = '<div class="ld-h" style="color:#C4115A">Error: ' + e.message + '</div>';
  }
});

</script>
</body>
</html>
