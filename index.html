<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:ital@0;1&display=swap');

:root{--p:#E8196A;--pd:#C4115A;--pl:#F5D0E3;--bg:#FDF5F8;--card:#fff;
  --c1:#2A0A15;--c2:#7A4060;--c3:#B08090;--bdr:#F0D0E0;--grn:#1B8A5A;--gbg:#E8F5EE}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A0A10;--card:#2A1020;--c1:#F5E6EC;--c2:#C090A8;--c3:#906880;
  --bdr:#4A2035;--gbg:#0A2018;--pl:#4A1028}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--c1);min-height:100vh;overflow-x:hidden}
#ld{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:999;transition:opacity .3s}
#ld.out{opacity:0;pointer-events:none}
.ld-logo{width:80px;height:80px;background:linear-gradient(135deg,#C4115A,#E8196A);
  border-radius:22px;display:flex;align-items:center;justify-content:center;
  font-size:40px;box-shadow:0 8px 28px rgba(232,25,106,.28)}
.ld-h{font-size:22px;font-weight:800;color:var(--c1)}
.ld-brand{font-size:12px;font-weight:700;color:var(--p);letter-spacing:1px;text-transform:uppercase}
.ld-s{font-size:13px;color:var(--c3)}
.spin{width:26px;height:26px;border:3px solid var(--pl);border-top-color:var(--p);
  border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hdr{background:linear-gradient(135deg,#C4115A,#E8196A,#F04090);
  padding:env(safe-area-inset-top,52px) 22px 22px;position:relative;overflow:hidden;
  border-bottom:1px solid rgba(0,0,0,.35)}
.hdr:before{content:"";position:absolute;top:-60px;right:-40px;width:200px;height:200px;
  background:rgba(255,255,255,.07);border-radius:50%}
.hdr:after{content:"";position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;
  background:rgba(255,255,255,.04);border-radius:50%}
.hdr-brand{display:flex;align-items:center;justify-content:center;gap:0;
  position:relative;z-index:1;padding-top:8px}
.hdr-divider{width:1px;height:28px;background:rgba(255,255,255,.4);margin:0 12px;flex-shrink:0}
.hdr-otg{font-family:"Playfair Display",Georgia,serif;font-size:18px;font-style:italic;
  color:#fff;letter-spacing:.5px}
.hdr-day-row{display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1;gap:8px;margin-top:12px}
.d-pill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600}
.h-ey{color:rgba(255,255,255,.65);font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;margin-bottom:2px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.h-day{color:#fff;font-size:26px;font-weight:600;line-height:1.1;
  font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:.5px;
  text-shadow:0 2px 6px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.4)}
.prog{margin-top:14px;display:flex;align-items:center;gap:11px;position:relative;z-index:1}
.p-track{flex:1;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.15)}
.p-fill{height:100%;background:#fff;border-radius:4px;transition:width .5s ease;
  box-shadow:0 0 8px rgba(255,255,255,.8)}
.p-lbl{color:rgba(255,255,255,.9);font-size:12px;font-weight:700;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.content{padding:20px 16px 108px;max-width:480px;margin:0 auto}
.scr{display:none}.scr.on{display:block}
.cc{background:#fff;border-radius:18px;box-shadow:0 8px 28px rgba(0,0,0,.14);
  overflow:hidden;margin-bottom:16px;border:1px solid rgba(0,0,0,.1);
  transition:transform .15s ease,box-shadow .15s ease;touch-action:pan-y}
.cc.swiping{transition:none}
.cc-top{background:linear-gradient(135deg,#C4115A,#E8196A);padding:13px 17px;
  display:flex;align-items:center;justify-content:space-between}
.cc-ey{color:rgba(255,255,255,.8);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.cc-pill{background:rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;color:#fff;font-size:11px;font-weight:700}
.cc-body{padding:17px}
.f-name{font-size:19px;font-weight:700;color:var(--c1);line-height:1.2;margin-bottom:6px;
  font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:.3px}
.f-addr{display:flex;align-items:flex-start;gap:7px;color:var(--c2);font-size:13px;line-height:1.5;margin-bottom:12px}
.note-prev{background:#FFF0F6;border-radius:10px;border:1px solid rgba(232,25,106,.25);
  padding:10px 12px;cursor:pointer;margin-bottom:4px}
.note-prev:active{border-color:var(--p)}
.note-lbl{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:4px}
.note-txt{font-size:13px;color:var(--c2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-txt.empty{color:var(--c3);font-style:italic}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px 20px;margin-top:10px;color:#fff;font-size:15px;font-weight:700;
  border:none;border-radius:12px;cursor:pointer;text-decoration:none;
  font-family:inherit;user-select:none;-webkit-touch-callout:none}
.btn-nav{background:linear-gradient(135deg,#C4115A,#E8196A);box-shadow:0 4px 16px rgba(232,25,106,.35)}
.btn-nav:active{opacity:.85}
.btn-done{background:linear-gradient(135deg,#1B8A5A,#2AA876);box-shadow:0 4px 14px rgba(27,138,90,.3)}
.btn-done:active{opacity:.85}
.btn-home{background:linear-gradient(135deg,#1B8A5A,#2AA876);box-shadow:0 4px 14px rgba(27,138,90,.3)}
.nxt{background:transparent;border-radius:0;border:none;border-left:3px solid var(--p);
  padding:6px 12px;margin-top:14px;display:flex;align-items:center;gap:10px}
.nxt-dot{display:none}
.nxt-ey{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.5px}
.nxt-nm{font-size:14px;font-weight:600;color:var(--c1);margin-top:1px}
.s-title{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;
  letter-spacing:1.5px;margin:24px 0 10px 2px}
.slist{display:flex;flex-direction:column;gap:8px}
.si{background:#FFF5F8;border-radius:12px;border:1px solid rgba(0,0,0,.12);
  padding:11px 13px;display:flex;align-items:center;gap:10px}
.si.done{opacity:.35;background:#fff}
.si.cur{border-color:var(--p);border-width:2px;background:#FFF0F6}
.si.nav{border-color:#1B8A5A;border-width:2px;background:#F0FBF6}
.sn{width:30px;height:30px;border-radius:50%;background:var(--bg);
  border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--c3);flex-shrink:0}
.sn.dn{background:var(--gbg);border-color:#B8DFD0;color:var(--grn);font-size:14px}
.sn.ac{background:var(--p);border-color:var(--p);color:#fff;
  box-shadow:0 0 0 4px rgba(232,25,106,.2),0 2px 8px rgba(232,25,106,.4)}
.sn.nv{background:#1B8A5A;border-color:#1B8A5A;color:#fff;font-size:14px;
  box-shadow:0 0 0 4px rgba(27,138,90,.2)}
.si-i{flex:1;min-width:0}
.si-n{font-size:15px;font-weight:600;color:var(--c1);font-family:"Cormorant Garamond",Georgia,serif}
.si-a{font-size:12px;color:var(--c3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.off{text-align:center;padding:52px 18px}
.off-i{font-size:50px;margin-bottom:12px}
.off-h{font-size:22px;font-weight:800;color:var(--c1);margin-bottom:6px}
.off-s{font-size:14px;color:var(--c2);line-height:1.6}
.nwb{margin-top:20px;background:#fff;border-radius:12px;border:1px solid var(--bdr);padding:14px;text-align:left}
.nwb-e{font-size:10px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:1px}
.nwb-d{font-size:16px;font-weight:700;color:var(--p);margin-top:3px}
.nwb-c{font-size:12px;color:var(--c2);margin-top:2px}
.done-w{text-align:center;padding:34px 12px}
.done-i{font-size:56px;margin-bottom:12px}
.done-h{font-size:24px;font-weight:800;color:var(--c1);margin-bottom:6px}
.done-s{font-size:13px;color:var(--c2);margin-bottom:20px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat{background:#fff;border-radius:12px;border:1px solid var(--bdr);padding:13px;text-align:center}
.stat-n{font-size:24px;font-weight:800;color:var(--p)}
.stat-l{font-size:10px;color:var(--c3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.thu{background:linear-gradient(135deg,#1A0A3A,#2D1B5A);border-radius:12px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.thu-e{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.thu-n{font-size:13px;font-weight:700;color:#fff;margin-top:2px}
.wi{background:#fff;border-radius:12px;border:1px solid var(--bdr);
  padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px}
.wi.wt{border-color:var(--p);background:#FFF0F6}
.wbox{width:44px;height:44px;border-radius:12px;background:var(--bg);
  border:1.5px solid var(--bdr);display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0}
.wbox.wt{background:var(--p);border-color:var(--p)}
.wn{font-size:18px;font-weight:800;color:var(--c1);line-height:1}
.wn.wt{color:#fff}
.wd{font-size:9px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.3px}
.wd.wt{color:rgba(255,255,255,.7)}
.wi-i{flex:1}.wi-dn{font-size:14px;font-weight:700;color:var(--c1)}
.wi-ct{font-size:12px;color:var(--c3);margin-top:2px}
.t-tag{display:inline-block;background:var(--p);color:#fff;font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:8px;text-transform:uppercase;vertical-align:middle;margin-left:5px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--bdr);padding:8px 0 env(safe-area-inset-bottom,14px);
  display:flex;justify-content:space-around;z-index:100}
.ntab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 22px;
  cursor:pointer;background:none;border:none;color:var(--c3);font-size:10px;
  font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-family:inherit}
.ntab.on{color:var(--p)}
.ntab svg{width:20px;height:20px}
#note-modal{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;background:var(--bg)}
#note-modal.open{display:flex}
#add-stop-modal{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;background:var(--bg)}
#add-stop-modal.open{display:flex}
.search-result{background:#fff;border:1.5px solid var(--bdr);border-radius:10px;padding:11px 13px;
  margin-bottom:6px;cursor:pointer;display:flex;flex-direction:column}
.search-result:active{border-color:var(--p);background:#FFF0F6}
.sr-name{font-size:14px;font-weight:600;color:var(--c1)}
.sr-addr{font-size:12px;color:var(--c3);margin-top:1px}
.sr-none{font-size:13px;color:var(--c3);text-align:center;padding:14px;cursor:pointer;
  text-decoration:underline;font-weight:600}
.fab-add{position:fixed;bottom:100px;right:18px;width:52px;height:52px;border-radius:26px;
  background:linear-gradient(135deg,#C4115A,#E8196A);box-shadow:0 6px 20px rgba(232,25,106,.45);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:90;border:none}
.fab-add svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nm-hdr{background:linear-gradient(135deg,#C4115A,#E8196A);
  padding:env(safe-area-inset-top,44px) 18px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.nm-title{color:#fff;font-size:15px;font-weight:700;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nm-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;font-family:inherit}

.nm-body{flex:1;overflow-y:auto;padding:20px 18px}
.nm-read{font-size:15px;color:var(--c1);line-height:1.7;white-space:pre-wrap;min-height:100px}
.nm-read.empty{color:var(--c3);font-style:italic}
.nm-textarea{width:100%;min-height:220px;font-size:15px;color:var(--c1);
  line-height:1.7;border:1.5px solid var(--p);border-radius:12px;padding:12px;
  font-family:inherit;background:#fff;resize:none;outline:none;display:none}
.nm-footer{padding:16px 18px env(safe-area-inset-bottom,20px);
  border-top:1px solid var(--bdr);background:#fff;display:none;gap:10px}
.nm-footer.show{display:flex}
.nm-save{flex:1;padding:14px;background:linear-gradient(135deg,#C4115A,#E8196A);
  color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;
  cursor:pointer;font-family:inherit}
.nm-cancel{padding:14px 20px;background:var(--bg);color:var(--c2);
  font-size:15px;font-weight:600;border:1px solid var(--bdr);border-radius:12px;
  cursor:pointer;font-family:inherit}
.nm-status{text-align:center;font-size:13px;color:var(--c3);padding:8px 0;display:none}
.slide-bar{position:relative;height:56px;background:rgba(232,25,106,.15);
  border-radius:28px;margin-top:12px;overflow:hidden;border:1.5px solid rgba(232,25,106,.3);
  user-select:none;-webkit-user-select:none}
.slide-track{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:var(--p);
  letter-spacing:.5px;pointer-events:none;transition:opacity .2s}
.slide-handle{position:absolute;left:4px;top:4px;width:48px;height:48px;
  background:#fff;border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(232,25,106,.4);cursor:grab;touch-action:none;
  transition:left .1s ease}
.slide-handle svg{width:22px;height:22px;stroke:var(--p);fill:none;
  stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.slide-bar.completing .slide-handle{background:#fff}
.pri-badge{display:inline-flex;align-items:center;gap:3px;background:#FFF8E6;
  border:1px solid #F5D680;border-radius:20px;padding:2px 8px;
  font-size:11px;font-weight:700;color:#9A6F00;vertical-align:middle;margin-left:4px}
.type-badge{display:inline-flex;align-items:center;background:rgba(232,25,106,.1);
  border:1px solid rgba(232,25,106,.25);border-radius:20px;padding:2px 8px;
  font-size:10px;font-weight:700;color:var(--p);margin-bottom:8px;letter-spacing:.5px}

</style>

<div id="ld">

  <div style="font-family:'Playfair Display',Georgia,serif;font-size:16px;font-style:italic;color:var(--p);letter-spacing:.8px;margin-bottom:8px">On The Go</div>

  <div class="spin"></div>
</div>

<div id="note-modal">
  <div class="nm-hdr">
    <button class="nm-close" onclick="closeNote()">&#10005;</button>
    <div class="nm-title" id="nm-title"></div>

  </div>
  <div class="nm-body">
    <div id="nm-last-visited" style="display:none;font-size:12px;font-weight:600;
      color:var(--p);background:#FFF0F6;border-radius:8px;padding:6px 10px;
      margin-bottom:12px;text-align:center"></div>
    <div class="nm-read" id="nm-read"></div>
    <textarea class="nm-textarea" id="nm-textarea" placeholder="Add notes about this facility&#8230;"></textarea>
    <div class="nm-status" id="nm-status"></div>
  </div>
  <div class="nm-footer" id="nm-footer">
    <button class="nm-cancel" onclick="cancelEdit()">Cancel</button>
    <button class="nm-save" onclick="saveNote()">Save Note</button>
  </div>
</div>

<div id="add-stop-modal">
  <div class="nm-hdr">
    <button class="nm-close" onclick="closeAddStop()">&#10005;</button>
    <div class="nm-title">Add a Stop</div>
    <div style="width:34px"></div>
  </div>
  <div class="nm-body">
    <div style="margin-bottom:6px">
      <label style="font-size:11px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Search Facility Name</label>
      <input type="text" id="as-search" placeholder="Start typing a name..." autocomplete="off" oninput="searchFacilities(this.value)" style="width:100%;padding:12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--c1)">
    </div>
    <div id="as-results" style="margin-bottom:16px"></div>

    <div id="as-manual" style="display:none">
      <div style="font-size:12px;color:var(--c3);margin-bottom:12px;padding:10px;background:#FFF8E6;border-radius:10px">Not in our list? Enter the address below and we&#39;ll do our best to place it.</div>
      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Name</label>
        <input type="text" id="as-name" placeholder="e.g. Smith Family Visit" style="width:100%;padding:12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--c1)">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:11px;font-weight:700;color:var(--c3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Address</label>
        <input type="text" id="as-addr" placeholder="e.g. 123 Main St, Portland OR" style="width:100%;padding:12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--c1)">
      </div>
      <button class="btn btn-nav" onclick="saveAddStopManual()">Find &amp; Add This Stop</button>
    </div>
    <div id="as-status" style="text-align:center;font-size:13px;color:var(--c3);padding:12px 0;display:none"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="hdr">

    backBtnHtml = '<button onclick="viewingDate=null;renderT()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:12px;display:block">\u2190 Back to Today</button>';
  }

  if (now.getDay()===0 || now.getDay()===6) {
    offDay(el, "&#9728;&#65039;", "Enjoy the Weekend!", "No route today. See you Monday!");
    document.getElementById("prog").style.display = "none"; return;
  }
  if (HOL[tKey]) {
    offDay(el, "&#127881;", HOL[tKey], "Enjoy the day off!");
    document.getElementById("prog").style.display = "none"; return;
  }
  tDay = getDay(now);
  if (!tDay) {
    offDay(el, "&#128197;", "No Route Scheduled", "Check back on your next work day.");
    document.getElementById("prog").style.display = "none"; return;
  }

  document.getElementById("fab-add").style.display = tDay ? "flex" : "none";
  loadP();
  var stops = resolve(tDay), total = stops.length;
  var doneCount = 0;
  for (var k in doneSet) { if (doneSet[k]) doneCount++; }
  var allDone = doneCount >= total;

  document.getElementById("prog").style.display = "flex";
  document.getElementById("p-fill").style.width = (doneCount/total*100) + "%";
  document.getElementById("p-lbl").textContent = doneCount + " of " + total + " stops";

  var h = backBtnHtml;
  if (tDay.t) {
    h += '<div class="thu"><div style="font-size:20px">&#127866;</div>';
    h += '<div><div class="thu-e">TONIGHT&#39;S ENDPOINT</div>';
    h += '<div class="thu-n">Hillside Pub &#8212; Beaverton</div></div></div>';
  }

  // Determine which stop is "active" - either manually selected, or first undone.
  // Guard against a stale activeIdx left over from before a schedule update changed
  // this day's stop count/order - an out-of-range index here would otherwise crash
  // the render below (stops[curIdx] -> undefined -> TypeError) leaving the screen blank.
  var curIdx = (activeIdx !== null && activeIdx >= 0 && activeIdx < stops.length) ? activeIdx : null;
  if (curIdx === null && !allDone) {
    for (var i = 0; i < stops.length; i++) {
      if (!isStopDone(stops, i)) { curIdx = i; break; }
    }
  }

  if (allDone) {
    var dest = tDay.t ? "Hillside Pub" : "Home";
    var durl = "maps://maps.apple.com/?daddr=" + (tDay.t ? HILL : HC) + "&dirflg=d";
    var routeStartStr = safeGetItem("routeStart_"+tKey);
    var timeStr = "";
    if (routeStartStr) {
      var routeStart = new Date(routeStartStr);
      var elapsed = Math.round((new Date() - routeStart) / 60000);
      var hrs = Math.floor(elapsed/60), mins = elapsed%60;
      timeStr = hrs > 0 ? hrs+"h "+mins+"m" : mins+"m";
    }
    var notesToday = safeJSONParse(safeGetItem("notesToday_"+tKey), []).length;
    h += '<div class="done-w">';
    h += '<div class="done-i">&#127881;</div>';
    h += '<div class="done-h">All ' + total + ' Stops Done!</div>';
    h += '<div class="done-s">Great work today, Ashley.</div>';
    h += '<div class="d-grid">';
    h += '<div class="stat"><div class="stat-n">' + total + '</div><div class="stat-l">Stops Visited</div></div>';
    h += '<div class="stat"><div class="stat-n">' + (timeStr||"\u2014") + '</div><div class="stat-l">Time on Route</div></div>';
    h += '<div class="stat"><div class="stat-n">' + notesToday + '</div><div class="stat-l">Notes Added</div></div>';
    h += '<div class="stat"><div class="stat-n">' + (tDay.t ? "&#127866;" : "&#127968;") + '</div><div class="stat-l">' + dest + ' Next</div></div>';
    h += '</div>';
    h += '<a href="' + durl + '" class="btn btn-home">';
    h += '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';
    h += 'Route to ' + dest + '</a></div>';
  } else {
    var s = stops[curIdx];
    var murl = (s[2] && s[3])
      ? "maps://maps.apple.com/?daddr=" + s[2] + "," + s[3] + "&dirflg=d"
      : "maps://maps.apple.com/?daddr=" + encodeURIComponent(s[1]) + "&dirflg=d";
    var note = getNote(s[0]);
    h += '<div class="cc">';
    h += '<div class="cc-top">';
    h += '<span class="cc-ey">NOW HEADING TO</span>';
    h += '<span class="cc-pill">Stop ' + (curIdx+1) + ' of ' + total + '</span>';
    h += '</div><div class="cc-body">';
    var isPri = PRIORITY.indexOf(s[0]) !== -1;
    h += '<div class="f-name">' + esc(s[0]) + (isPri ? ' <span class="pri-badge">&#11088; Priority</span>' : '') + '</div>';
    var fType = FTYPE[s[0]] || "";
    if (fType) h += '<div class="type-badge">' + fType + '</div>';
    h += '<div class="f-addr"><span style="color:#E8196A;flex-shrink:0;margin-top:1px">&#128205;</span>';
    h += '<span>' + esc(s[1]) + '</span></div>';
    h += '<div class="note-prev" data-fac="' + safeAttr(s[0]) + '" onclick="openNoteEl(this)">';
    h += '<div class="note-lbl">&#128221; Notes</div>';
    if (note) {
      h += '<div class="note-txt">' + esc(note) + '</div>';
    } else {
      h += '<div class="note-txt empty">Tap to add notes&#8230;</div>';
    }
    h += '</div>';
    if (navigating) {
      h += '<div class="slide-bar" id="slide-bar">';
      h += '<div class="slide-track" id="slide-track">Slide to Complete Stop</div>';
      h += '<div class="slide-handle" id="slide-handle">';
      h += '<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
      h += '</div></div>';
      h += '<button onclick="skipStop()" style="width:100%;margin-top:8px;padding:10px;background:none;border:none;color:var(--c3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Skip for now \u2014 come back later</button>';
    } else {
      h += '<a class="btn btn-nav" href="' + murl + '" onclick="startNav()">';
      h += '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';
      h += 'Navigate to Stop ' + (curIdx+1) + '</a>';
      h += '<button onclick="skipStop2(' + curIdx + ')" style="width:100%;margin-top:8px;padding:10px;background:none;border:none;color:var(--c3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Skip for now \u2014 come back later</button>';
    }
    h += '</div></div>';

    // Up Next - find next undone stop after curIdx
    var nextIdx = null;
    for (var j = curIdx+1; j < stops.length; j++) {
      if (!isStopDone(stops, j)) { nextIdx = j; break; }
    }
    if (nextIdx !== null) {
      var n = stops[nextIdx];
      h += '<div class="nxt"><div class="nxt-dot"></div>';
      h += '<div><div class="nxt-ey">UP NEXT</div><div class="nxt-nm">' + esc(n[0]) + '</div></div></div>';
    } else {
      h += '<div class="nxt"><div class="nxt-dot"></div>';
      h += '<div><div class="nxt-ey">AFTER THIS</div>';
      h += '<div class="nxt-nm">Route to ' + (tDay.t ? "Hillside Pub" : "Home") + '</div></div></div>';
    }
  }

  h += '<div class="s-title">Today&#39;s Full Route</div><div class="slist">';
  for (var i = 0; i < stops.length; i++) {
    var st = stops[i];
    var isDone = isStopDone(stops, i);
    var isActive = (i === curIdx) && !allDone;
    var isNav  = isActive && navigating;
    var isCur  = isActive && !navigating;
    var sNote  = getNote(st[0]);
    var cls = "si" + (isDone?" done":"") + (isCur?" cur":"") + (isNav?" nav":"");
    var ncls = "sn" + (isDone?" dn":"") + (isCur?" ac":"") + (isNav?" nv":"");
    var num = isDone ? "&#10003;" : String(i+1);
    var clickable = !isDone && !isCur ? ' onclick="selectStop('+i+')" style="cursor:pointer"' : (isDone ? ' onclick="reopenStop('+i+')" style="cursor:pointer"' : '');
    h += '<div class="' + cls + '"' + clickable + '>';
    h += '<div class="' + ncls + '">' + num + '</div>';
    var stPri = PRIORITY.indexOf(st[0]) !== -1;
    h += '<div class="si-i"><div class="si-n">' + esc(st[0]) + (stPri ? ' &#11088;' : '') + '</div>';
    h += '<div class="si-a">' + (sNote ? "&#128221; " + esc(sNote.substring(0,40)) + (sNote.length>40?"...":"") : esc(st[1])) + '</div>';
    h += '</div></div>';
  }
  var fl = tDay.t ? "Hillside Pub" : "Home";
  var fa = tDay.t ? "16305 SW Barrows Rd, Beaverton" : "6258 NE Rosebay Dr, Hillsboro";
  h += '<div class="si' + (allDone ? " done" : "") + '">';
  h += '<div class="sn' + (allDone ? " dn" : "") + '" style="font-size:12px">' + (allDone ? "&#10003;" : (tDay.t ? "&#127866;" : "&#127968;")) + '</div>';
  h += '<div class="si-i"><div class="si-n">' + fl + '</div>';
  h += '<div class="si-a">' + fa + '</div></div></div></div>';

  if (!isToday) {
    el.innerHTML = h;
    setTimeout(initSlider, 50);
  } else {
    var unfinishedBanner = "";
    var checkDate = new Date(); checkDate.setDate(checkDate.getDate()-1);
    for (var ci=0; ci<5; ci++) {
      if (checkDate.getDay() > 0 && checkDate.getDay() < 6) {
        var ck = dk(checkDate);
        var cd = getDay(checkDate);
        if (cd) {
          var savedDone = safeJSONParse(safeGetItem("done_"+ck), {});
          var savedDoneCount = 0;
          for (var kk in savedDone) { if (savedDone[kk]) savedDoneCount++; }
          var totalStops = resolve(cd).length;
          if (savedDoneCount > 0 && savedDoneCount < totalStops) {
            var rem = totalStops - savedDoneCount;
            unfinishedBanner = '<div onclick="viewDay(\'' + ck + '\')" style="background:#FFF8E6;border:1px solid #F5D680;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">'
              +'<div><div style="font-size:11px;font-weight:700;color:#9A6F00;text-transform:uppercase;letter-spacing:.5px">Unfinished Route</div>'
              +'<div style="font-size:14px;font-weight:700;color:#2A0A15;margin-top:2px">'+DAYS[checkDate.getDay()]+' '+SMONS[checkDate.getMonth()]+' '+checkDate.getDate()+' &bull; '+rem+' stops remaining</div></div>'
              +'<div style="color:#9A6F00;font-size:18px">&#8594;</div></div>';
            break;
          }
        }
      }
      checkDate.setDate(checkDate.getDate()-1);
    }
    el.innerHTML = unfinishedBanner + h;
    setTimeout(initSlider, 50);
  }
}

function offDay(el, icon, title, sub) {

var weekOffset = 0; // 0 = this week, -1 = last week, 1 = next week, etc.

function changeWeek(delta) {
  weekOffset += delta;
  renderW();
}

function renderW() {
  var el = document.getElementById("w-scr");
  var now = new Date(), todK = dk(now);
  var mon = new Date(now), df = now.getDay()===0 ? -6 : 1-now.getDay();
  mon.setDate(now.getDate()+df);
  mon.setDate(mon.getDate() + (weekOffset*7));

  var rangeEnd = new Date(mon); rangeEnd.setDate(mon.getDate()+4);
  var rangeLabel = SMONS[mon.getMonth()] + " " + mon.getDate() + " \u2013 " + SMONS[rangeEnd.getMonth()] + " " + rangeEnd.getDate();
  var weekLabel = weekOffset === 0 ? "This Week" : (weekOffset === 1 ? "Next Week" : (weekOffset === -1 ? "Last Week" : rangeLabel));

  var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h += '<button onclick="changeWeek(-1)" style="background:#fff;border:1px solid var(--bdr);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--p);font-family:inherit">&#8249;</button>';
  h += '<div style="text-align:center"><div class="s-title" style="margin:0">' + weekLabel + '</div>';
  if (weekOffset !== 0) h += '<div style="font-size:11px;color:var(--c3);margin-top:1px">' + rangeLabel + '</div>';
  h += '</div>';
  h += '<button onclick="changeWeek(1)" style="background:#fff;border:1px solid var(--bdr);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--p);font-family:inherit">&#8250;</button>';
  h += '</div>';

  if (weekOffset !== 0) {
    h += '<button onclick="weekOffset=0;renderW()" style="display:block;margin:0 auto 14px;background:none;border:none;color:var(--p);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:underline">Back to This Week</button>';
  }

  for (var i = 0; i < 5; i++) {
    var d = new Date(mon); d.setDate(mon.getDate()+i);
    var k = dk(d), isT = k===todK, hol = HOL[k], data = getDay(d);
    h += '<div class="wi' + (isT ? " wt" : "") + '" onclick="viewDay(\''+k+'\')" style="cursor:pointer">';
    h += '<div class="wbox' + (isT ? " wt" : "") + '">';
    h += '<div class="wn' + (isT ? " wt" : "") + '">' + d.getDate() + '</div>';
    h += '<div class="wd' + (isT ? " wt" : "") + '">' + SDAYS[d.getDay()] + '</div></div>';
    h += '<div class="wi-i"><div class="wi-dn">' + DAYS[d.getDay()];
    if (isT) h += '<span class="t-tag">Today</span>';
    h += '</div><div class="wi-ct">';
    if (hol) {
      h += "&#127881; " + hol;
    } else if (data) {
      var dName = DAYS[d.getDay()];
      var totalSt = resolve(data).length;
      var totalVi;
      if (SPECIAL_VISITS[k] !== undefined) {
        totalVi = SPECIAL_VISITS[k];
      } else {
        var wkSt = WKLY_STOPS[dName] || 0;
        var wkVi = WKLY_VISITS[dName] || 0;
        var afhSt = totalSt - wkSt;
        totalVi = wkVi + afhSt;
      }
      h += totalSt + " stops &bull; " + totalVi + " visits";
    } else {
      h += "No route";
    }
    h += '</div></div></div>';
  }
  el.innerHTML = h;
}

function fetchWeather() {
  var WC = {0:"Clear",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Icy Fog",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",80:"Showers",81:"Showers",82:"Heavy Showers",95:"Thunderstorm",96:"Thunderstorm",99:"Thunderstorm"};
  var icons = {0:"☀️",1:"🌤",2:"⛅️",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌧",55:"🌧",
    61:"🌦",63:"🌧",65:"🌧",71:"🌨",73:"❄️",75:"❄️",80:"🌦",81:"🌧",82:"⛈",95:"⛈",96:"⛈",99:"⛈"};
  fetch("https://api.open-meteo.com/v1/forecast?latitude=45.537&longitude=-122.916&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America/Los_Angeles")
    .then(function(r){return r.json();})
    .then(function(d){
      var temp = Math.round(d.current.temperature_2m);
      var code = d.current.weather_code;
      var icon = icons[code] || "🌡";
      var desc = WC[code] || "Clear";

      el.style.display = "block";
    })
    .catch(function(){});
}

function findNextVisit(name) {
  // Scan forward from today through SC to find this facility's next scheduled date.
  // Works for weekly, flex-cadence, and AFH facilities alike since they're all
  // ultimately just stop indices inside SC's day-by-day route data.
  var matchIdxs = [];
  for (var i = 0; i < SL.length; i++) {
    if (SL[i][0] === name) matchIdxs.push(i);
  }
  if (matchIdxs.length === 0) return null;

  var today = new Date();
  today.setHours(12,0,0,0);
  var cur = new Date(today);
  for (var days = 0; days < 730; days++) {
    var dow = cur.getDay();
    if (dow > 0 && dow < 6) {
      var ds = dk(cur);
      var wk = wkKey(cur);
      var day = SC[wk] ? SC[wk][ds] : null;
      if (day) {
        for (var j = 0; j < matchIdxs.length; j++) {
          if (day.s.indexOf(matchIdxs[j]) !== -1) {
            return ds;
          }
        }
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
  return null;
}

var facSearchTimer = null;
function searchFacilitiesTabDebounced(query) {
  clearTimeout(facSearchTimer);
  facSearchTimer = setTimeout(function(){ searchFacilitiesTab(query); }, 150);
}

function searchFacilitiesTab(query) {
  var resultsEl = document.getElementById("fac-results");
  if (!query || query.trim().length < 1) { resultsEl.innerHTML = ""; return; }
  var q = query.trim().toLowerCase();
  var matches = [];
  var seen = {};
  for (var i = 0; i < SL.length; i++) {
    var nameMatch = SL[i][0].toLowerCase().indexOf(q) !== -1;
    var addrMatch = SL[i][1].toLowerCase().indexOf(q) !== -1;
    if ((nameMatch || addrMatch) && !seen[SL[i][0]]) {
      matches.push(SL[i]);
      seen[SL[i][0]] = true;
      if (matches.length >= 8) break;
    }
  }
  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="sr-none" style="cursor:default">No facilities found matching "' + esc(query) + '"</div>';
    return;
  }
  var h = "";
  matches.forEach(function(m) {
    var nextDate = findNextVisit(m[0]);
    var dateLabel = "No upcoming visit found";
    if (nextDate) {
      var nd = new Date(nextDate + "T12:00:00");
      dateLabel = nd.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
    }
    var star = PRIORITY.indexOf(m[0]) !== -1 ? ' \u2b50' : '';
    h += '<div class="search-result" style="cursor:default">';
    h += '<div class="sr-name">' + esc(m[0]) + star + '</div>';
    h += '<div class="sr-addr">' + esc(m[1]) + '</div>';
    h += '<div style="margin-top:6px;font-size:13px;font-weight:700;color:var(--p)">Next visit: ' + dateLabel + '</div>';
    h += '</div>';
  });
  resultsEl.innerHTML = h;
}

  var monthName = now.toLocaleDateString("en-US",{month:"long",year:"numeric"});

      h += '</div><div class="si-i"><div class="si-n">' + esc(v.n) + '</div>';
      h += '<div class="si-a">' + v.wd + '</div></div></div>';
    });
    h += '</div>';
  }

  if (completed.length > 0) {
    h += '<div class="s-title">Completed (' + completed.length + ')</div><div class="slist">';
    completed.slice(-5).reverse().forEach(function(v) {
      var vDate = new Date(v.d + "T12:00:00");
      h += '<div class="si done"><div class="sn dn" style="font-size:13px">&#10003;</div>';
      h += '<div class="si-i"><div class="si-n">' + esc(v.n) + '</div>';
      h += '<div class="si-a">' + vDate.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) + '</div></div></div>';
    });
    h += '</div>';
  }

  el.innerHTML = h;
}

function show(n) {
  document.getElementById("fab-add").style.display = (n === "t") ? "" : "none";
  var scrs = document.querySelectorAll(".scr");
  for (var i=0; i<scrs.length; i++) scrs[i].classList.remove("on");
  var tabs = document.querySelectorAll(".ntab");
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove("on");
  document.getElementById(n+"-scr").classList.add("on");
  document.getElementById("tab-"+n).classList.add("on");
  if (n==="t") renderT();
  if (n==="w") { viewingDate=null; weekOffset=0; renderW(); }
  if (n==="m") renderM();
}

function distMi(lat1, lon1, lat2, lon2) {
  var R = 3958.8;
  var dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function openAddStop() {
  if (!tDay) { return; }
  document.getElementById("as-search").value = "";
  document.getElementById("as-name").value = "";
  document.getElementById("as-addr").value = "";
  document.getElementById("as-results").innerHTML = "";
  document.getElementById("as-manual").style.display = "none";
  document.getElementById("as-status").style.display = "none";
  document.getElementById("add-stop-modal").classList.add("open");
  document.body.style.overflow = "hidden";
  setTimeout(function(){ document.getElementById("as-search").focus(); }, 150);
}

function closeAddStop() {
  document.getElementById("add-stop-modal").classList.remove("open");
  document.body.style.overflow = "";
}

function searchFacilities(query) {
  var resultsEl = document.getElementById("as-results");
  document.getElementById("as-manual").style.display = "none";
  if (!query || query.trim().length < 1) { resultsEl.innerHTML = ""; return; }
  var q = query.trim().toLowerCase();
  var matches = [];
  for (var i = 0; i < SL.length; i++) {
    if (SL[i][0].toLowerCase().indexOf(q) !== -1) {
      matches.push(SL[i]);
      if (matches.length >= 6) break;
    }
  }
  var h = "";
  matches.forEach(function(m) {
    h += '<div class="search-result" onclick="pickKnownStop(\'' + safeAttr(m[0]) + '\')">';
    h += '<div class="sr-name">' + esc(m[0]) + '</div>';
    h += '<div class="sr-addr">' + esc(m[1]) + '</div></div>';
  });
  h += '<div class="sr-none" onclick="showManualEntry()">Can&#39;t find it? Enter a new address &#8594;</div>';
  resultsEl.innerHTML = h;
}

function showManualEntry() {
  document.getElementById("as-manual").style.display = "block";
  document.getElementById("as-name").value = document.getElementById("as-search").value;
}

function bestInsertPosition(stops, lat, lon) {
  // Find which position minimizes added detour distance among remaining (undone) stops
  var remaining = [];
  for (var i = 0; i < stops.length; i++) { if (!isStopDone(stops, i)) remaining.push(i); }
  if (remaining.length === 0) return stops.length - 1; // insert at end if everything done
  var bestPos = remaining[0] - 1; // default: right before first remaining stop
  var bestCost = Infinity;
  for (var r = 0; r < remaining.length; r++) {
    var idx = remaining[r];
    var prev = idx > 0 ? stops[idx-1] : null;
    var cur = stops[idx];
    var cost = prev ? distMi(prev[2], prev[3], lat, lon) + distMi(lat, lon, cur[2], cur[3]) - distMi(prev[2], prev[3], cur[2], cur[3])
                     : distMi(lat, lon, cur[2], cur[3]);
    if (cost < bestCost) { bestCost = cost; bestPos = idx - 1; }
  }
  // Also check inserting after the very last remaining stop
  var lastIdx = remaining[remaining.length-1];
  var lastStop = stops[lastIdx];
  var endCost = distMi(lastStop[2], lastStop[3], lat, lon);
  if (endCost < bestCost) bestPos = lastIdx;
  return bestPos;
}

function insertStop(name, addr, lat, lon) {
  var stops = resolve(tDay);
  var pos = (lat && lon) ? bestInsertPosition(stops, lat, lon) : stops.length - 1;
  var extras = safeJSONParse(safeGetItem("extras_"+tKey), []);
  extras.push({name: name, addr: addr || "No address provided", afterPos: pos, lat: lat||0, lon: lon||0});
  safeSetItem("extras_"+tKey, JSON.stringify(extras));
  closeAddStop();
  renderT();
}

function pickKnownStop(name) {
  for (var i = 0; i < SL.length; i++) {
    if (SL[i][0] === name) {
      insertStop(SL[i][0], SL[i][1], SL[i][2], SL[i][3]);
      return;
    }
  }
}

function saveAddStopManual() {
  var name = document.getElementById("as-name").value.trim();
  var addr = document.getElementById("as-addr").value.trim();
  if (!name) { alert("Please enter a name."); return; }
  if (!addr) {
    insertStop(name, "No address provided", 0, 0);
    return;
  }
  var statusEl = document.getElementById("as-status");
  statusEl.textContent = "Finding the best spot...";
  statusEl.style.display = "block";
  fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(addr))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data.length > 0) {
        insertStop(name, addr, parseFloat(data[0].lat), parseFloat(data[0].lon));
      } else {
        statusEl.textContent = "Couldn\'t locate that address \u2014 adding to end of route.";
        setTimeout(function(){ insertStop(name, addr, 0, 0); }, 1200);
      }
    })
    .catch(function(){
      insertStop(name, addr, 0, 0);
    });
}

window.addEventListener("load", function() {
  try {
    document.getElementById("app").style.display = "block";
    var ld = document.getElementById("ld");
    ld.classList.add("out");
    setTimeout(function() { ld.style.display = "none"; }, 400);
    show("t");
    loadAllNotes();
    fetchWeather();
  } catch(e) {
    document.getElementById("ld").innerHTML = '<div class="ld-h" style="color:#C4115A">Error: ' + e.message + '</div>';
  }
});
